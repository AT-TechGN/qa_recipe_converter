[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = tests/test_*.py
python_classes = Test*
python_functions = test_*
addopts = --cov=apps --cov-report=term-missing --cov-report=html -v

[coverage:run]
source = apps
omit =
    */migrations/*
    */tests/*
    */__init__.py
    */apps.py

[coverage:report]
show_missing = True
skip_covered = False
